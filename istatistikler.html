<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem İstatistikleri | DRİVERCAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        /* Tasarım Değişkenleri */
        :root {
            --primary: #1e3c72;
            --secondary: #2a5298;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --bg: #f4f7fe;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
        }

        [data-theme="dark"] {
            --bg: #020617;
            --white: #1e293b;
            --primary: #3b82f6;
            --text-dark: #f8fafc;
            --text-light: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: var(--bg);
            color: var(--text-dark);
            display: flex;
            min-height: 100vh;
        }

        /* Sidebar Tasarımı */
        .sidebar {
            width: 280px;
            background: var(--primary);
            color: white;
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            position: sticky;
            top: 0;
            height: 100vh;
        }

        .logo-area {
            text-align: center;
            margin-bottom: 50px;
        }

        .menu-item {
            padding: 15px 20px;
            margin-bottom: 10px;
            border-radius: 12px;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            align-items: center;
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
        }

        .menu-item:hover,
        .menu-item.active {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .menu-item i {
            margin-right: 15px;
            width: 25px;
            text-align: center;
        }

        /* Ana İçerik Alanı */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
        }

        .header {
            margin-bottom: 40px;
        }

        .header h1 {
            font-size: 2rem;
            color: var(--primary);
        }

        /* İstatistik Kartları Izgarası */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(450px, 1fr));
            gap: 30px;
        }

        .chart-card {
            background: var(--white);
            border-radius: 20px;
            padding: 30px;
            box-shadow: var(--shadow);
            min-height: 400px;
            display: flex;
            flex-direction: column;
        }

        .chart-title {
            font-size: 1.1rem;
            font-weight: 600;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        .chart-container {
            flex: 1;
            position: relative;
        }

        /* Özet Bilgi Paneli */
        .summary-panel {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .summary-item {
            background: var(--white);
            padding: 20px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            text-align: center;
            border-bottom: 4px solid var(--primary);
        }

        .item-label {
            font-size: 0.85rem;
            color: var(--text-light);
            margin-bottom: 5px;
        }

        .item-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--primary);
        }
    </style>
</head>

<body>

    <div class="sidebar">
        <div class="logo-area" style="flex-direction: column; justify-content: center; padding-left: 0; gap: 10px; text-align: center;">
            <img src="resim1.png" alt="Logo" style="width: 100px; height: auto; background: rgba(255, 255, 255, 0.95); padding: 8px 12px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
            <h2>DRİVERCAR</h2>
        </div>
        <div id="sidebar-links"></div>
    </div>

    <div class="main-content">
        <div class="header">
            <h1><i class="fas fa-chart-pie"></i> Sistem Analitiği</h1>
            <p>Kursiyer verileri ve finansal durumun gerçek zamanlı özeti.</p>
        </div>

        <div class="summary-panel">
            <div class="summary-item">
                <div class="item-label">Toplam Kursiyer</div>
                <div class="item-value" id="totalStudents">-</div>
            </div>
            <div class="summary-item" style="border-color: var(--success);">
                <div class="item-label">Kasa Durumu (Net)</div>
                <div class="item-value" id="totalBalance">-</div>
            </div>
            <div class="summary-item" style="border-color: var(--warning);">
                <div class="item-label">Aktif Araç</div>
                <div class="item-value" id="totalVehicles">-</div>
            </div>
            <div class="summary-item" style="border-color: var(--secondary);">
                <div class="item-label">Uzman Eğitmen</div>
                <div class="item-value" id="totalInstructors">-</div>
            </div>
        </div>

        <div class="stats-grid">
            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-user-plus"></i> Aylık Yeni Kayıt Trendi</div>
                <div class="chart-container">
                    <canvas id="registrationChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-id-card"></i> Ehliyet Sınıfı Dağılımı</div>
                <div class="chart-container">
                    <canvas id="branchChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-money-bill-wave"></i> Gelir / Gider Dengesi</div>
                <div class="chart-container">
                    <canvas id="financeChart"></canvas>
                </div>
            </div>

            <div class="chart-card">
                <div class="chart-title"><i class="fas fa-graduation-cap"></i> Sınav Başarı Oranları</div>
                <div class="chart-container">
                    <canvas id="successChart"></canvas>
                </div>
            </div>
        </div>
    </div>

    <script>
        let regChart, branchChart, financeChart, successChart;

        /**
         * Erişim Kontrolü ve Tema Ayarları
         */
        function checkAccess() {
            const role = localStorage.getItem('userRole') || 'staff';
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') document.body.setAttribute('data-theme', 'dark');

            const sidebar = document.getElementById('sidebar-links');
            let links = `
                <a href="kursiyerkayit.html" class="menu-item"><i class="fas fa-user-plus"></i> Kursiyer Kayıt</a>
                <a href="kursiyerlistesi.html" class="menu-item"><i class="fas fa-list-ul"></i> Kursiyer Listesi</a>
                <a href="suruspratikleri.html" class="menu-item"><i class="fas fa-steering-wheel"></i> Sürüş Pratikleri</a>
                <a href="araclar.html" class="menu-item"><i class="fas fa-car"></i> Araç Filosu</a>
                <a href="egitmen.html" class="menu-item"><i class="fas fa-chalkboard-teacher"></i> Eğitmen Yönetimi</a>
                <a href="muhasebe.html" class="menu-item"><i class="fas fa-credit-card"></i> Muhasebe</a>
                <a href="istatistikler.html" class="menu-item active"><i class="fas fa-chart-line"></i> İstatistikler</a>
                <a href="sistemayarlari.html" class="menu-item"><i class="fas fa-cog"></i> Sistem Ayarları</a>
                <a href="giris.html" class="menu-item" onclick="localStorage.clear()"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</a>
            `;
            sidebar.innerHTML = links;
        }

        /**
         * Veritabanından Canlı Verileri Çekme
         * Backend API'sine istek atarak güncel istatistikleri alır.
         */
        async function updateStats() {
            try {
                const response = await fetch('http://localhost:5000/api/stats');
                const data = await response.json();
                
                if (data.error) throw new Error(data.error);

                // Özet Kartlarını Güncelle
                const summary = data.summary;
                document.getElementById('totalStudents').innerText = summary.toplam_kursiyer;
                document.getElementById('totalInstructors').innerText = summary.toplam_egitmen;
                document.getElementById('totalVehicles').innerText = summary.toplam_arac;

                // Finansal Özeti Hesapla
                const gelir = parseFloat(data.finance.find(f => f.islem_tipi === 'Gelir')?.toplam || 0);
                const gider = parseFloat(data.finance.find(f => f.islem_tipi === 'Gider')?.toplam || 0);
                document.getElementById('totalBalance').innerText = `₺${(gelir - gider).toLocaleString('tr-TR')}`;

                // Grafikleri Başlat
                initCharts(data);
            } catch (err) {
                console.error("İstatistik yükleme hatası:", err);
            }
        }

        /**
         * Chart.js Grafikleri Başlatma ve Konfigürasyon
         */
        function initCharts(stats) {
            // Eski grafikleri temizle (Yenileme yaparken çakışma olmaması için)
            if (regChart) regChart.destroy();
            if (branchChart) branchChart.destroy();
            if (financeChart) financeChart.destroy();
            if (successChart) successChart.destroy();

            // 1. Kayıt Trendi (Çizgi Grafik)
            const regLabels = stats.registrations.map(r => r.ay);
            const regData = stats.registrations.map(r => parseInt(r.sayi));

            regChart = new Chart(document.getElementById('registrationChart'), {
                type: 'line',
                data: {
                    labels: regLabels,
                    datasets: [{
                        label: 'Yeni Kayıt',
                        data: regData,
                        borderColor: '#1e3c72',
                        backgroundColor: 'rgba(30, 60, 114, 0.1)',
                        fill: true,
                        tension: 0.4
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 2. Ehliyet Sınıfı Dağılımı (Doughnut)
            const branchLabels = stats.branches.map(b => b.ehliyet_sinifi + ' Sınıfı');
            const branchData = stats.branches.map(b => parseInt(b.sayi));

            branchChart = new Chart(document.getElementById('branchChart'), {
                type: 'doughnut',
                data: {
                    labels: branchLabels,
                    datasets: [{
                        data: branchData,
                        backgroundColor: ['#1e3c72', '#27ae60', '#f39c12', '#e74c3c', '#3498db']
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // 3. Finansal Durum (Sütun Grafik)
            const gelir = stats.finance.find(f => f.islem_tipi === 'Gelir')?.toplam || 0;
            const gider = stats.finance.find(f => f.islem_tipi === 'Gider')?.toplam || 0;

            financeChart = new Chart(document.getElementById('financeChart'), {
                type: 'bar',
                data: {
                    labels: ['Genel Finans Durumu'],
                    datasets: [
                        {
                            label: 'Gelir (TL)',
                            data: [parseFloat(gelir)],
                            backgroundColor: '#27ae60',
                            borderRadius: 8
                        },
                        {
                            label: 'Gider (TL)',
                            data: [parseFloat(gider)],
                            backgroundColor: '#e74c3c',
                            borderRadius: 8
                        }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } }
                }
            });

            // 4. Başarı Oranları (Simülasyon Verisi)
            successChart = new Chart(document.getElementById('successChart'), {
                type: 'bar',
                data: {
                    labels: ['Genel Başarı'],
                    datasets: [
                        {
                            label: 'Teorik Sınav %',
                            data: [88],
                            backgroundColor: '#3498db',
                            borderRadius: 8
                        },
                        {
                            label: 'Direksiyon Sınavı %',
                            data: [72],
                            backgroundColor: '#9b59b6',
                            borderRadius: 8
                        }
                    ]
                },
                options: { 
                    responsive: true, 
                    maintainAspectRatio: false,
                    plugins: { legend: { position: 'top' } }
                }
            });
        }

        // Sayfa açıldığında çalıştır
        document.addEventListener('DOMContentLoaded', () => {
            checkAccess();
            updateStats();
        });
    </script>
</body>
</html>
