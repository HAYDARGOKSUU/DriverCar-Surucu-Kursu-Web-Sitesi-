<!DOCTYPE html>
<html lang="tr">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sürüş Pratikleri | DRİVERCAR</title>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --primary: #1e3c72;
            --secondary: #2a5298;
            --success: #27ae60;
            --warning: #f39c12;
            --danger: #e74c3c;
            --info: #3498db;
            --bg: #f4f7fe;
            --white: #ffffff;
            --text-dark: #1e293b;
            --text-light: #64748b;
            --shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            --glass: rgba(255, 255, 255, 0.95);
        }

        [data-theme="dark"] {
            --bg: #020617;
            --white: #1e293b;
            --primary: #3b82f6;
            --text-dark: #f8fafc;
            --text-light: #94a3b8;
            --glass: rgba(30, 41, 59, 0.95);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Poppins', sans-serif;
        }

        body {
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            display: flex;
            min-height: 100vh;
            color: var(--text-dark);
            transition: all 0.4s ease;
        }

        [data-theme="dark"] body {
            background: linear-gradient(135deg, #020617 0%, #1e1b4b 50%, #020617 100%);
        }

        /* Sidebar */
        .sidebar {
            width: 280px;
            background: rgba(30, 60, 114, 0.95);
            backdrop-filter: blur(15px);
            padding: 30px 20px;
            display: flex;
            flex-direction: column;
            box-shadow: 10px 0 30px rgba(0, 0, 0, 0.1);
            position: sticky;
            top: 0;
            height: 100vh;
            z-index: 100;
        }

        .logo-area {
            color: white;
            text-align: center;
            margin-bottom: 50px;
        }

        .logo-area i {
            font-size: 3.5rem;
            margin-bottom: 15px;
            filter: drop-shadow(0 5px 15px rgba(0,0,0,0.3));
        }

        .menu-item {
            color: rgba(255, 255, 255, 0.7);
            text-decoration: none;
            padding: 16px 20px;
            margin-bottom: 8px;
            border-radius: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            font-weight: 500;
            transition: 0.4s;
        }

        .menu-item:hover,
        .menu-item.active {
            background: rgba(255, 255, 255, 0.15);
            color: white;
            transform: translateX(8px);
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }

        /* Main Content */
        .main-content {
            flex: 1;
            padding: 40px;
            overflow-y: auto;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(5px);
        }

        .page-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .page-header h1 {
            font-size: 1.8rem;
            font-weight: 700;
        }

        /* Grid Layout */
        .grid-container {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 30px;
        }

        .card {
            background: var(--white);
            border-radius: 25px;
            padding: 30px;
            box-shadow: var(--shadow);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--primary);
        }

        /* Form Elements */
        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }

        .input-with-icon {
            position: relative;
        }

        .input-with-icon i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-light);
        }

        .input-with-icon input,
        .input-with-icon select,
        .input-with-icon textarea {
            width: 100%;
            padding: 12px 15px 12px 40px;
            border: 2px solid #f0f2f5;
            border-radius: 12px;
            outline: none;
            background: #f8fafc;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .input-with-icon input:focus {
            border-color: var(--primary);
            background: white;
        }

        .btn-add {
            width: 100%;
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: 0.3s;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 10px;
        }

        .btn-add:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        /* Table */
        .table-container {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th {
            text-align: left;
            padding: 15px;
            color: var(--text-light);
            font-weight: 500;
            font-size: 0.85rem;
            border-bottom: 1px solid #f0f2f5;
        }

        td {
            padding: 15px;
            border-bottom: 1px solid #f0f2f5;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .status-pill {
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 600;
        }

        .pill-success {
            background: rgba(39, 174, 96, 0.1);
            color: var(--success);
        }

        .pill-warning {
            background: rgba(243, 156, 18, 0.1);
            color: var(--warning);
        }

        /* Progress Circle/Bar */
        .progress-stats {
            display: flex;
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            flex: 1;
            background: var(--white);
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            box-shadow: var(--shadow);
        }

        .stat-icon {
            width: 50px;
            height: 50px;
            border-radius: 12px;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 1.5rem;
        }

        .stat-info h3 {
            font-size: 1.2rem;
            font-weight: 700;
        }

        .stat-info p {
            font-size: 0.8rem;
            color: var(--text-light);
        }

        .whatsapp-float {
            position: fixed;
            bottom: 30px;
            right: 30px;
            width: 60px;
            height: 60px;
            background-color: #25d366;
            color: #fff;
            border-radius: 50%;
            text-align: center;
            font-size: 30px;
            box-shadow: 2px 2px 10px rgba(0, 0, 0, 0.2);
            z-index: 1000;
            display: flex;
            justify-content: center;
            align-items: center;
            text-decoration: none;
            transition: all 0.3s;
        }

        .whatsapp-float:hover {
            transform: scale(1.1);
            background-color: #128c7e;
        }
        /* Renkli ve Modern Hata/Uyarı Popup */
        .toast-container {
            position: fixed;
            top: 25px;
            right: -400px;
            width: 350px;
            background: linear-gradient(135deg, #1e3c72, #2a5298);
            color: white;
            border-radius: 20px;
            padding: 18px 25px;
            display: flex;
            align-items: center;
            gap: 18px;
            box-shadow: 0 15px 35px rgba(30, 60, 114, 0.4);
            z-index: 9999;
            transition: all 0.5s cubic-bezier(0.68, -0.55, 0.265, 1.55);
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(10px);
        }

        .toast-container.warning {
            background: linear-gradient(135deg, #f6d365 0%, #fda085 100%);
            box-shadow: 0 15px 35px rgba(253, 160, 133, 0.4);
            color: #7f3f00;
        }

        .toast-container.success {
            background: linear-gradient(135deg, #11998e, #38ef7d);
            box-shadow: 0 15px 35px rgba(56, 239, 125, 0.4);
            color: white;
        }

        .toast-container.error {
            background: linear-gradient(135deg, #ff416c, #ff4b2b);
            box-shadow: 0 15px 35px rgba(255, 65, 108, 0.4);
            color: white;
        }

        .toast-container.show {
            right: 25px;
            animation: shake 0.5s ease-in-out;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-10px); }
            75% { transform: translateX(10px); }
        }

        .toast-container i {
            font-size: 2.2rem;
            background: rgba(255, 255, 255, 0.25);
            width: 50px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 15px;
            flex-shrink: 0;
        }

        .toast-container.warning i {
            background: rgba(127, 63, 0, 0.1);
            color: #7f3f00;
        }

        .toast-content h4 {
            margin: 0 0 4px 0;
            font-size: 1.2rem;
            font-weight: 800;
            letter-spacing: 0.5px;
        }

        .toast-content p {
            margin: 0;
            font-size: 0.95rem;
            font-weight: 500;
            opacity: 0.9;
            line-height: 1.4;
        }

        .toast-close {
            margin-left: auto;
            background: rgba(255, 255, 255, 0.2);
            border: none;
            color: white;
            width: 30px;
            height: 30px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            transition: 0.3s;
        }

        .toast-container.warning .toast-close {
            background: rgba(127, 63, 0, 0.1);
            color: #7f3f00;
        }

        .toast-close:hover {
            background: rgba(255, 255, 255, 0.4);
            transform: rotate(90deg);
        }
    </style>
</head>

<body>
    <div class="sidebar">
        <div class="logo-area" style="flex-direction: column; justify-content: center; padding-left: 0; gap: 10px; text-align: center;">
            <img src="resim1.png" alt="Logo" style="width: 100px; height: auto; background: rgba(255, 255, 255, 0.95); padding: 8px 12px; border-radius: 12px; box-shadow: 0 5px 15px rgba(0,0,0,0.2);">
            <h2>DRİVERCAR</h2>
        </div>
        <div id="sidebar-links"></div>
    </div>

    <!-- Renkli Toast Bildirimi -->
    <div class="toast-container" id="toast">
        <i class="fas fa-info-circle"></i>
        <div class="toast-content">
            <h4 id="toastTitle">Bildirim</h4>
            <p id="toastMessage">İşlem başarıyla tamamlandı.</p>
        </div>
        <button class="toast-close" onclick="closeToast()"><i class="fas fa-times"></i></button>
    </div>

    <div class="main-content">
        <div class="page-header">
            <h1>Sürüş Pratikleri & Direksiyon Eğitimi</h1>
            <div class="user-info" style="display: flex; align-items: center; gap: 15px;">
                <span id="roleLabel" class="status-pill pill-success">Eğitmen Paneli</span>
                <button onclick="toggleTheme()" style="background:none; border:none; cursor:pointer; font-size:1.2rem; color:var(--text-dark);"><i class="fas fa-moon"></i></button>
            </div>
        </div>

        <div class="progress-stats">
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(30, 60, 114, 0.1); color: var(--primary);">
                    <i class="fas fa-clock"></i>
                </div>
                <div class="stat-info">
                    <h3 id="totalHours">420 Saat</h3>
                    <p>Toplam Eğitim Süresi</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(39, 174, 96, 0.1); color: var(--success);">
                    <i class="fas fa-user-check"></i>
                </div>
                <div class="stat-info">
                    <h3 id="activeStudents">28</h3>
                    <p>Aktif Direksiyon Kursiyeri</p>
                </div>
            </div>
            <div class="stat-card">
                <div class="stat-icon" style="background: rgba(243, 156, 18, 0.1); color: var(--warning);">
                    <i class="fas fa-gas-pump"></i>
                </div>
                <div class="stat-info">
                    <h3 id="fuelConsumption">1.240 L</h3>
                    <p>Aylık Yakıt Tüketimi</p>
                </div>
            </div>
        </div>

        <div class="grid-container">
            <!-- Pratik Ekle Formu -->
            <div class="card">
                <div class="card-title"><i class="fas fa-plus-circle"></i> Yeni Pratik Kaydı</div>
                <form id="practiceForm" onsubmit="addPractice(event)">
                    <div class="form-group">
                        <label>Kursiyer Seçin</label>
                        <div class="input-with-icon">
                            <select id="studentSelect" required>
                                <option value="" disabled selected>Kursiyer Seçiniz</option>
                            </select>
                            <i class="fas fa-user-graduate"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Eğitim Aracı</label>
                        <div class="input-with-icon">
                            <select id="vehicleSelect" required>
                                <option value="" disabled selected>Araç Seçiniz</option>
                            </select>
                            <i class="fas fa-car"></i>
                        </div>
                    </div>
                    <div class="grid-container" style="grid-template-columns: 1fr 1fr; gap: 15px;">
                        <div class="form-group">
                            <label>Süre (Saat)</label>
                            <div class="input-with-icon">
                                <input type="number" id="duration" placeholder="Örn: 2" min="1" max="4" required>
                                <i class="fas fa-hourglass-half"></i>
                            </div>
                        </div>
                        <div class="form-group">
                            <label>Tarih</label>
                            <div class="input-with-icon">
                                <input type="date" id="practiceDate" required>
                                <i class="fas fa-calendar-alt"></i>
                            </div>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Eğitim Konusu</label>
                        <div class="input-with-icon">
                            <select id="topic" required>
                                <option>Paralel Park</option>
                                <option>L Park</option>
                                <option>Yokuş Kalkış</option>
                                <option>Ani Fren</option>
                                <option>Şehir İçi Trafik</option>
                                <option>Gece Sürüşü</option>
                            </select>
                            <i class="fas fa-book-open"></i>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>Eğitmen Notu / Değerlendirme</label>
                        <div class="input-with-icon">
                            <textarea id="notes" placeholder="Kursiyerin performansı hakkında notlar..." style="height: 100px; resize: none;"></textarea>
                            <i class="fas fa-comment-alt" style="top: 20px; transform: none;"></i>
                        </div>
                    </div>
                    <button type="submit" class="btn-add">
                        <i class="fas fa-save"></i> Pratiği Kaydet
                    </button>
                </form>
            </div>

            <!-- Son Pratikler Tablosu -->
            <div class="card">
                <div class="card-title"><i class="fas fa-history"></i> Son Kaydedilen Pratikler</div>
                <div class="table-container">
                    <table>
                        <thead>
                            <tr>
                                <th>Tarih</th>
                                <th>Kursiyer</th>
                                <th>Konu</th>
                                <th>Süre</th>
                                <th>Durum</th>
                            </tr>
                        </thead>
                        <tbody id="practiceTable">
                            <!-- Veriler veritabanından gelecek -->
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <a href="https://wa.me/905000000000" class="whatsapp-float" target="_blank">
        <i class="fab fa-whatsapp"></i>
    </a>

    <script>
        function toggleTheme() {
            const body = document.body;
            const isDark = body.getAttribute('data-theme') === 'dark';
            const newTheme = isDark ? 'light' : 'dark';
            body.setAttribute('data-theme', newTheme);
            localStorage.setItem('theme', newTheme);
        }

        // Renkli Bildirim Sistemi
        function showToast(title, message, type = 'success') {
            const toast = document.getElementById('toast');
            const icon = toast.querySelector('i');
            
            toast.classList.remove('success', 'warning', 'error');
            toast.classList.add(type);
            
            if (type === 'success') icon.className = 'fas fa-check-circle';
            else if (type === 'warning') icon.className = 'fas fa-exclamation-triangle';
            else if (type === 'error') icon.className = 'fas fa-exclamation-circle';

            document.getElementById('toastTitle').innerText = title;
            document.getElementById('toastMessage').innerText = message;
            
            toast.classList.add('show');
            if (window.toastTimer) clearTimeout(window.toastTimer);
            window.toastTimer = setTimeout(closeToast, 5000);
        }

        function closeToast() {
            document.getElementById('toast').classList.remove('show');
        }

        async function addPractice(e) {
            e.preventDefault();
            const student = document.getElementById('studentSelect').value.split(' (')[0];
            const topic = document.getElementById('topic').value;
            const duration = document.getElementById('duration').value;
            const date = document.getElementById('practiceDate').value;

            try {
                const response = await fetch('http://localhost:5000/api/pratikler', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        tarih: date,
                        kursiyer: student,
                        konu: topic,
                        sure: parseInt(duration),
                        durum: 'Tamamlandı'
                    })
                });

                if (response.ok) {
                    showToast('Başarılı!', 'Sürüş pratiği başarıyla veritabanına kaydedildi.', 'success');
                    e.target.reset();
                    document.getElementById('practiceDate').valueAsDate = new Date();
                    loadPractices();
                } else {
                    showToast('Hata!', 'Kayıt sırasında bir hata oluştu.', 'error');
                }
            } catch (err) {
                console.error('Bağlantı hatası:', err);
                showToast('Bağlantı Hatası!', 'Sunucuya bağlanılamadı.', 'error');
            }
        }

        async function loadPractices() {
            try {
                const response = await fetch('http://localhost:5000/api/pratikler');
                const data = await response.json();
                
                const table = document.getElementById('practiceTable');
                table.innerHTML = '';
                
                data.forEach(pratik => {
                    const statusClass = pratik.durum === 'Tamamlandı' ? 'pill-success' : 'pill-warning';
                    const newRow = `
                        <tr>
                            <td>${new Date(pratik.tarih).toLocaleDateString('tr-TR')}</td>
                            <td>${pratik.kursiyer}</td>
                            <td>${pratik.konu}</td>
                            <td>${pratik.sure} Saat</td>
                            <td><span class="status-pill ${statusClass}">${pratik.durum}</span></td>
                        </tr>
                    `;
                    table.insertAdjacentHTML('beforeend', newRow);
                });
            } catch (err) {
                console.error('Veriler yüklenemedi:', err);
            }
        }

        // Veritabanından Verileri Yükle (Kursiyer ve Araçlar)
        async function loadOptions() {
            try {
                // Kursiyerleri Yükle
                const studentRes = await fetch('http://localhost:5000/api/students');
                const students = await studentRes.json();
                const studentSelect = document.getElementById('studentSelect');
                studentSelect.innerHTML = '<option value="" disabled selected>Kursiyer Seçiniz</option>';
                students.forEach(s => {
                    const opt = document.createElement('option');
                    opt.value = `${s.ad} ${s.soyad}`;
                    opt.innerText = `${s.ad} ${s.soyad} (${s.ehliyet_sinifi || 'B'} Sınıfı)`;
                    studentSelect.appendChild(opt);
                });

                // Araçları Yükle
                const vehicleRes = await fetch('http://localhost:5000/api/vehicles');
                const vehicles = await vehicleRes.json();
                const vehicleSelect = document.getElementById('vehicleSelect');
                vehicleSelect.innerHTML = '<option value="" disabled selected>Araç Seçiniz</option>';
                vehicles.forEach(v => {
                    const opt = document.createElement('option');
                    opt.value = v.plaka;
                    opt.innerText = `${v.plaka} - ${v.marka_model} (${v.vites_tipi})`;
                    vehicleSelect.appendChild(opt);
                });
            } catch (err) {
                console.error('Seçenekler yüklenemedi:', err);
            }
        }

        // Sidebar & Auth
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('userRole') || 'staff';
            const theme = localStorage.getItem('theme') || 'light';
            if (theme === 'dark') document.body.setAttribute('data-theme', 'dark');

            const sidebar = document.getElementById('sidebar-links');
            let links = '';

            if (role === 'student') {
                window.location.href = "profil.html";
                return;
            } else if (role === 'instructor') {
                document.getElementById('roleLabel').innerText = "Eğitmen Paneli";
                links = `
                    <a href="egitmen.html" class="menu-item"><i class="fas fa-chalkboard-teacher"></i> Eğitmen Paneli</a>
                    <a href="kursiyerlistesi.html" class="menu-item"><i class="fas fa-list-ul"></i> Öğrencilerim</a>
                    <a href="suruspratikleri.html" class="menu-item active"><i class="fas fa-steering-wheel"></i> Sürüş Pratikleri</a>
                    <a href="profil.html" class="menu-item"><i class="fas fa-user-circle"></i> Profilim</a>
                    <a href="giris.html" class="menu-item" onclick="localStorage.clear()"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</a>
                `;
            } else {
                document.getElementById('roleLabel').innerText = "Yönetici Paneli";
                links = `
                    <a href="kursiyerkayit.html" class="menu-item"><i class="fas fa-user-plus"></i> Kursiyer Kayıt</a>
                    <a href="kursiyerlistesi.html" class="menu-item"><i class="fas fa-list-ul"></i> Kursiyer Listesi</a>
                    <a href="suruspratikleri.html" class="menu-item active"><i class="fas fa-steering-wheel"></i> Sürüş Pratikleri</a>
                    <a href="egitmen.html" class="menu-item"><i class="fas fa-chalkboard-teacher"></i> Eğitmen Yönetimi</a>
                    <a href="muhasebe.html" class="menu-item"><i class="fas fa-credit-card"></i> Muhasebe</a>
                    <a href="istatistikler.html" class="menu-item"><i class="fas fa-chart-line"></i> İstatistikler</a>
                    <a href="sistemayarlari.html" class="menu-item"><i class="fas fa-cog"></i> Sistem Ayarları</a>
                    <a href="giris.html" class="menu-item" onclick="localStorage.clear()"><i class="fas fa-sign-out-alt"></i> Çıkış Yap</a>
                `;
            }
            sidebar.innerHTML = links;
            document.getElementById('practiceDate').valueAsDate = new Date();
            
            // Veritabanından pratikleri ve seçenekleri yükle
            loadPractices();
            loadOptions();
        });
    </script>
</body>
